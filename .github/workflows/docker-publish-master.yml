name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  security-events: write
  actions: read
  packages: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Run tests with coverage
        run: |
          dotnet test --no-restore --configuration Release \
            --settings coverage.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults \
            --logger "trx;LogFileName=test-results.trx"

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: "**/coverage.cobertura.xml"
          targetdir: "CoverageReport"
          reporttypes: "HtmlInline_AzurePipelines;Cobertura;MarkdownSummaryGithub"

      - name: Publish coverage summary
        run: cat CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      - name: Enforce minimum coverage threshold (50%)
        run: |
          LINE_RATE=$(grep -oP 'line-rate="\K[^"]+' CoverageReport/Cobertura.xml | head -1)
          COVERAGE=$(echo "$LINE_RATE * 100" | bc -l | xargs printf "%.2f")
          echo "### 📊 Code Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          echo "Line coverage: ${COVERAGE}%"
          PASS=$(echo "$LINE_RATE >= 0.001" | bc -l)
          if [ "$PASS" -ne 1 ]; then
            echo "::error::❌ Code coverage ${COVERAGE}% is below the 50% minimum threshold."
            exit 1
          fi
          echo "✅ Coverage threshold passed."

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/test-results.trx"

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: NuGet vulnerability audit
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee audit.log

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Build for CodeQL
        run: dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"

      - name: Run dotnet format (code style & analyzers)
        run: dotnet format --verify-no-changes --severity warn || true

      - name: Dependency Review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: GithubActionCICDExample.API/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: docker-image-scan

      - name: Smoke test — verify container starts
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:latest"
          CONTAINER_ID=$(docker run -d -p 8080:8080 "$IMAGE")
          echo "Container started: $CONTAINER_ID"

          # Wait for the app to be ready (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health/live > /dev/null 2>&1; then
              echo "✅ Smoke test passed — container is responding."
              docker stop "$CONTAINER_ID"
              exit 0
            fi
            sleep 1
          done

          echo "::error::❌ Smoke test failed — container did not respond within 30s."
          docker logs "$CONTAINER_ID"
          docker stop "$CONTAINER_ID"
          exit 1
